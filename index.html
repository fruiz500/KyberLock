<!DOCTYPE html>
<html lang="en" xml:lang="en" xmlns="http://www.w3.org/1999/xhtml">

<head>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
    <title>Crypto</title>
    <meta name="Crypto"
        content="passlok, URSA, browser, encryption, decryption, symmetric, public key, signature, AES, ECDH, Diffie, Hellman, elliptic curve, advanced, javascript, PGP, PRISM, Quantum, Crystals, Kyber, ML-KEM">
    <meta name="Description" content="Crypto">
    <meta name="author" content="F. Ruiz">
    <meta name="robots" content="index">

    <meta name="viewport" content="width=device-width, minimum-scale=1, maximum-scale=1, user-scalable=no">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <link rel="apple-touch-icon" href="touch-icon.png">
    <link rel="shortcut icon" type="image/x-icon" href="favicon.png">
    <link rel="manifest" href="site.webmanifest">

    <style>
        body {
            background: #f0f0f0;
            font-family: sans-serif;
            margin: 0;
            padding: 20px;
            /* Simple padding for the status message */
        }

        #status {
            color: #555;
            font-size: 14px;
        }
    </style>

    <script>
        // 1. ELEGANT INTERCEPT: Check for the Service Worker's secret handshake
        if (window.location.search.includes('worker_cache=true')) {
            console.log("Background caching pass detected. Sleeping to save CPU.");
        } else {
            // 2. THE LIVE APP: If there's no flag, run the full cryptographic boot
            const PUBLIC_KEY_B64 = "MIIBIjANBgkqhkiG9w0BAQEFAAOCAQ8AMIIBCgKCAQEAzD1OVmkLaEWg3Q7wVPa6lK1ynBCjkKJ0i8cf5iaXeCOl9stpgvzaXKKQ+mBp8phjJvXngyFAJ/qblaY8YngMgiJrrBuY0GOg1BHWcWfUeYlp3TVtQVZDeXHd3TbfnEvssMnAutCAKxKeonLOe6U05phv6rEgtrbWOBGVoKMEhZlaZd0mhZeJk7BM3JZFwVICUrQHTS7qCmGFBHjut6oLZejmIQTX3ycY70cNbYwKWdTYTQev6/V1sCGhgtNviPtD5g/Nh3P58yqLKO/LVqiMk52vxlLyWTtLjwnDswzp6YBqZ1nM0NwhFWZpJrIStzDoWpD0eLzFywq326ASbQTLsQIDAQAB";

            async function verifyAndBoot() {
                window.onload = null;
                const statusEl = document.getElementById('status');

                try {
                    const nocache = `?t=${Date.now()}`;
                    const manifestRes = await fetch('hashes.json' + nocache);
                    const manifestText = await manifestRes.text();

                    const sigRes = await fetch('manifest.sig' + nocache);
                    const sigBuffer = await sigRes.arrayBuffer();

                    const pubKeyData = Uint8Array.from(atob(PUBLIC_KEY_B64), c => c.charCodeAt(0));
                    const key = await crypto.subtle.importKey(
                        "spki", pubKeyData, { name: "RSASSA-PKCS1-v1_5", hash: "SHA-256" }, false, ["verify"]
                    );
                    const isValid = await crypto.subtle.verify("RSASSA-PKCS1-v1_5", key, sigBuffer, new TextEncoder().encode(manifestText));
                    if (!isValid) throw new Error("Manifest signature invalid.");

                    const manifest = JSON.parse(manifestText);

                    const verificationTasks = Object.entries(manifest).map(async ([file, expectedHash]) => {
                        const isLocal = ['localhost', '127.0.0.1', '[::1]'].includes(window.location.hostname);
                        const fetchUrl = isLocal ? file : `${file}?t=${Date.now()}`;

                        const response = await fetch(fetchUrl);
                        const rawBuffer = await response.arrayBuffer();

                        const actualHash = await computeSHA256(rawBuffer);
                        if (actualHash !== expectedHash) throw new Error(`Integrity Breach: ${file}`);

                        return { file, content: new TextDecoder().decode(rawBuffer) };
                    });

                    const verifiedModules = await Promise.all(verificationTasks);

                    for (const { file, content } of verifiedModules) {
                        if (file.endsWith('.json') && file.includes('config')) {
                            const config = JSON.parse(content);
                            if (config.appName) document.title = config.appName;
                            if (config.favicon) {
                                const link = document.querySelector("link[rel*='icon']") || document.createElement('link');
                                link.type = 'image/x-icon';
                                link.rel = 'shortcut icon';
                                link.href = config.favicon;
                                document.getElementsByTagName('head')[0].appendChild(link);
                            }
                            if (config.description) {
                                const metaDesc = document.querySelector('meta[name="Description"]');
                                if (metaDesc) metaDesc.setAttribute("content", config.description);
                            }
                            console.log(`Verified Identity: ${config.appName}`);
                        } else if (file.endsWith('.css')) {
                            const style = document.createElement('style');
                            style.textContent = content + `\n/*# sourceURL=${file} */`;
                            document.head.appendChild(style);
                        } else if (file.endsWith('.html')) {
                            document.body.removeAttribute('style');
                            document.body.innerHTML = content;
                        } else if (file.endsWith('.js')) {
                            const script = document.createElement('script');
                            script.textContent = content + `\n//# sourceURL=${file}`;
                            document.head.appendChild(script);
                        }
                    }

                    console.log("High-speed boot complete.");
                    window.dispatchEvent(new Event('DOMContentLoaded'));

                    // Ensure the Service Worker only registers after a fully validated boot
                    if ('serviceWorker' in navigator) {
                        navigator.serviceWorker.register('./sw.js')
                            .then(registration => {
                                console.log('ServiceWorker registration successful with scope: ', registration.scope);
                            })
                            .catch(err => {
                                console.error('ServiceWorker registration failed: ', err);
                            });
                    }

                } catch (e) {
                    document.body.innerHTML = `<div style="color:red; padding:40px;"><h2>SECURITY ALERT</h2><p>${e.message}</p></div>`;
                    console.error(e);
                }
            }

            async function computeSHA256(buffer) {
                const hashBuf = await crypto.subtle.digest('SHA-256', buffer);
                return Array.from(new Uint8Array(hashBuf)).map(b => b.toString(16).padStart(2, '0')).join('');
            }

            document.addEventListener("DOMContentLoaded", () => {
                verifyAndBoot();
            }, { once: true });
        }
    </script>
</head>

<body>
    <div id="status">Verifying App Integrity...</div>
</body>

</html>
